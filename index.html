<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J.A.R.V.I.S.</title>
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="rain"></canvas>
  <div class="scanlines"></div>

  <!-- Único icono visible: opciones / configuración -->
  <button id="btn-config" title="Opciones">⚙</button>

  <main>
    <!-- Núcleo: pulsa o habla -->
    <div id="reactor" class="reactor idle" title="Pulsa para hablar">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="core"></div>
    </div>
    <p id="estado">EN ESPERA</p>

    <!-- Transcripción mínima estilo terminal -->
    <section id="chat" aria-live="polite"></section>

    <!-- Entrada de texto: solo visible si el dispositivo no soporta voz -->
    <div id="fallback" hidden>
      <input id="entrada" type="text" placeholder="> escribe una orden…" autocomplete="off">
      <button id="btn-enviar" title="Enviar">▸</button>
    </div>
  </main>

  <!-- Panel de configuración -->
  <dialog id="config">
    <h2>// OPCIONES</h2>
    <label>
      Tu nombre
      <input id="cfg-nombre" type="text" placeholder="¿Cómo debo llamarte?">
    </label>
    <label>
      Tratamiento
      <select id="cfg-trato">
        <option value="señor">Señor</option>
        <option value="señora">Señora</option>
        <option value="jefe">Jefe</option>
        <option value="">(solo el nombre)</option>
      </select>
    </label>
    <label>
      Voz de Jarvis
      <select id="cfg-voz"></select>
    </label>
    <label>
      Clave API de Claude (activa la IA y la búsqueda web)
      <input id="cfg-apikey" type="password" placeholder="sk-ant-…">
    </label>
    <label>
      ID de cliente OAuth de Google (activa Tasks y Calendar)
      <input id="cfg-googleclient" type="text" placeholder="xxxx.apps.googleusercontent.com">
    </label>
    <div class="fila-google">
      <button id="cfg-google-conectar" type="button">Conectar Google</button>
      <span id="cfg-google-estado"></span>
    </div>
    <label>
      ID de aplicación de Microsoft (activa To Do del trabajo)
      <input id="cfg-msclient" type="text" placeholder="00000000-0000-0000-0000-000000000000">
    </label>
    <div class="fila-google">
      <button id="cfg-ms-conectar" type="button">Conectar Microsoft</button>
      <span id="cfg-ms-estado"></span>
    </div>
    <p class="nota">Las claves se guardan solo en este navegador (localStorage). Los ID de Google (Cloud Console) y Microsoft (Azure/Entra) se crean gratis — las guías están en el README. Sin claves, Jarvis funciona con sus comandos integrados.</p>
    <div class="acciones">
      <button id="cfg-guardar">Guardar</button>
      <button id="cfg-cerrar">Cerrar</button>
    </div>
  </dialog>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js" async defer></script>
  <script src="skills.js"></script>
  <script src="jarvis.js"></script>
</body>
</html>
