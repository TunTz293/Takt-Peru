name: Monitor Prestamype Oportunidades

on:
  schedule:
    # Cada hora, lunes a viernes, 8am–8pm hora Perú (UTC-5 → UTC 13:00–01:00)
    - cron: "0 13-23 * * 1-5"
    - cron: "0 0-1 * * 2-6"
  workflow_dispatch:

jobs:
  check-opportunities:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run monitor
        env:
          PRESTAMYPE_EMAIL: ${{ secrets.PRESTAMYPE_EMAIL }}
          PRESTAMYPE_PASSWORD: ${{ secrets.PRESTAMYPE_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: warcaya.armar@gmail.com
        run: python scripts/monitor_prestamype.py
